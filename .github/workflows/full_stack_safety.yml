name: Full Stack Safety / Publish

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'

  e2e-tests:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Mono Repo with Submodules
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.MONOREPO_PAT }}

      - name: Install SOPS
        run: |
          curl -Lo sops https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin

      - name: Decrypt Backend Secrets
        run: |
          set -e
          cd backend
          if [ -f secrets.enc.yaml ]; then
            sops --decrypt --output-type dotenv secrets.enc.yaml > .env
            echo "Backend .env created, line count: $(wc -l < .env)"
          else
            echo "No secrets.enc.yaml found in backend folder!"
            exit 1
          fi
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Decrypt Frontend Secrets
        run: |
          set -e
          cd frontend
          if [ -f secrets.enc.yaml ]; then
            sops --decrypt --output-type dotenv secrets.enc.yaml > .env
            echo "Frontend .env created, line count: $(wc -l < .env)"
          else
            echo "No secrets.enc.yaml found in frontend folder!"
            exit 1
          fi
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Build and Start Stack
        run: |
          cd backend
          docker compose up --build -d
          
          cd ../frontend
          docker compose up --build -d

      - name: Wait for Health
        run: |
          SERVER_PORT=$(grep SERVER_PORT backend/.env | cut -d '=' -f2 | tr -d '\r')
          echo "Checking Backend on port: $SERVER_PORT"
          
          timeout 120s bash -c "until curl -f http://localhost:${SERVER_PORT}/api/health; do echo 'Wait BE...'; sleep 5; done"
          timeout 60s bash -c "until curl -f http://localhost:3000; do echo 'Wait FE...'; sleep 5; done"

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          working-directory: frontend
          browser: chrome
        env:
          CYPRESS_BASE_URL: http://localhost:3000

  build-and-push:
    needs: [ changes, e2e-tests ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.MONOREPO_PAT }}

      - name: Set up Docker Builds
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate Tags
        id: vars
        run: |
          echo "SHA_SHORT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "DATE=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Build and Push Backend
        if: needs.changes.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vetapp-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vetapp-backend:${{ steps.vars.outputs.SHA_SHORT }}

      - name: Build and Push Frontend
        if: needs.changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/vetapp-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/vetapp-frontend:${{ steps.vars.outputs.SHA_SHORT }}

  deploy:
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          token: ${{ secrets.MONOREPO_PAT }}

      - name: Install SOPS
        run: |
          curl -Lo sops https://github.com/getsops/sops/releases/download/v3.8.1/sops-v3.8.1.linux.amd64
          chmod +x sops
          sudo mv sops /usr/local/bin

      - name: Decrypt Backend Secrets
        run: |
          set -e
          cd backend
          if [ -f secrets.enc.yaml ]; then
            sops --decrypt --output-type dotenv secrets.enc.yaml > .env
            echo "Backend .env created, line count: $(wc -l < .env)"
          else
            echo "No secrets.enc.yaml found in backend folder!"
            exit 1
          fi
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Decrypt Frontend Secrets
        run: |
          set -e
          cd frontend
          if [ -f secrets.enc.yaml ]; then
            sops --decrypt --output-type dotenv secrets.enc.yaml > .env
            echo "Frontend .env created, line count: $(wc -l < .env)"
          else
            echo "No secrets.enc.yaml found in frontend folder!"
            exit 1
          fi
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}

      - name: Join secrets
        run: cat backend/.env frontend/.env > .env

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSHKEY }}
          source: "docker-compose.yml,.env"
          target: "~/app"

      - name: Execute Remote Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSHKEY }}
          script: |
            cd ~/app
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f