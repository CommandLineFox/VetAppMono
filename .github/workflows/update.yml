name: Update Submodules

on:
  repository_dispatch:
    types: [ update-submodule ]
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Monorepo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MONOREPO_PAT }}
          submodules: true
          fetch-depth: 0

      - name: Update Submodules
        run: |
          REPO_NAME="${{ github.event.client_payload.repo }}"
          
          if [ "$REPO_NAME" == "VetAppFrontend" ]; then
            TARGET_FOLDER="frontend"
          elif [ "$REPO_NAME" == "VetAppBackend" ]; then
            TARGET_FOLDER="backend"
          else
            TARGET_FOLDER="" 
          fi
          
          if [ -z "$TARGET_FOLDER" ]; then
            echo "Updating all submodules..."
            git submodule update --remote --recursive
          else
            echo "Updating only: $TARGET_FOLDER (from repository: $REPO_NAME)"
            git submodule update --remote -- "$TARGET_FOLDER"
          fi

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.MONOREPO_PAT }}
          commit-message: "Auto-update: ${{ github.event.client_payload.repo }} (${{ github.event.client_payload.sha }})"
          title: "Update Submodules: ${{ github.event.client_payload.repo }}"
          body: "Automated update of submodules triggered by push to ${{ github.event.client_payload.repo }}."
          branch: "auto-update-${{ github.event.client_payload.repo || 'manual' }}"
          base: "main"
          delete-branch: true

      - name: Enable Pull Request Auto-merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.MONOREPO_PAT }}